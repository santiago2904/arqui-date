<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Propuesta de Proyecto</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap");
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
      // ==========================================
      // CONFIGURACIÓN: PON AQUÍ TU NÚMERO
      // Formato: Código de país + número (Ej: 57 para Colombia, 52 para México, 34 para España)
      // Ejemplo sin símbolos: "573001234567"
      const MI_WHATSAPP = "573145051793";
      // ==========================================

      const { useState, useEffect } = React;

      const App = () => {
        const [step, setStep] = useState("intro");
        const [selectedDate, setSelectedDate] = useState("");
        const [isSigning, setIsSigning] = useState(false);
        const [suggestedDates, setSuggestedDates] = useState([]);

        useEffect(() => {
          // Generar fechas sugeridas (próximos 6 días desde mañana)
          const dates = [];
          const today = new Date();
          for (let i = 1; i <= 6; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            dates.push(date);
          }
          setSuggestedDates(dates);
        }, []);

        const formatDateForDisplay = (date) => {
          const days = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
          const months = [
            "Ene",
            "Feb",
            "Mar",
            "Abr",
            "May",
            "Jun",
            "Jul",
            "Ago",
            "Sep",
            "Oct",
            "Nov",
            "Dic",
          ];
          return {
            day: days[date.getDay()],
            date: date.getDate(),
            month: months[date.getMonth()],
            fullDate: date.toISOString().split("T")[0],
          };
        };

        const handleConfirm = () => {
          if (!selectedDate) return;
          setIsSigning(true);

          // Simular el tiempo de "firma"
          setTimeout(() => {
            setStep("success");
            setIsSigning(false);

            // Enviar confirmación por WhatsApp
            const mensaje = `¡Cordial saludo!  ya revisé y firmé los planos. La orden de construcción ha sido aprobada para el día: *${selectedDate}*. ¡Nos vemos! estoy loca por verte  ✨`;
            const whatsappUrl = `https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(mensaje)}`;

            // Abrir WhatsApp en una nueva pestaña
            window.open(whatsappUrl, "_blank");
          }, 1500);
        };

        const BlueprintBg = () => (
          <div
            className="absolute inset-0 z-0 opacity-10 pointer-events-none fixed"
            style={{
              backgroundImage: `radial-gradient(#2563eb 0.5px, transparent 0.5px), linear-gradient(to right, #2563eb 0.5px, transparent 0.5px), linear-gradient(to bottom, #2563eb 0.5px, transparent 0.5px)`,
              backgroundSize: "20px 20px, 40px 40px, 40px 40px",
            }}
          />
        );

        // Iconos SVG Integrados para no depender de librerías externas
        const IconRuler = () => (
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M21.3 15.3l-2.6 2.6a1 1 0 01-1.4 0l-12-12a1 1 0 010-1.4l2.6-2.6a1 1 0 011.4 0l12 12a1 1 0 010 1.4z" />
            <path d="M14.5 5.5l2 2" />
            <path d="M11.5 8.5l2 2" />
            <path d="M8.5 11.5l2 2" />
            <path d="M5.5 14.5l2 2" />
          </svg>
        );
        const IconMapPin = () => (
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
        );
        const IconHardHat = () => (
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M12 2a9 9 0 0 0-9 9v4h18v-4a9 9 0 0 0-9-9z" />
            <path d="M2 15h20v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-4z" />
          </svg>
        );
        const IconPen = () => (
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M12 19l7-7 3 3-7 7-3-3z" />
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
            <path d="M2 2l7.586 7.586" />
            <circle cx="11" cy="11" r="2" />
          </svg>
        );
        const IconCalendar = () => (
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        );
        const IconCheck = () => (
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
        );

        return (
          <div className="min-h-screen text-slate-800 font-sans flex flex-col items-center p-4 relative overflow-x-hidden pb-10">
            <BlueprintBg />

            <main className="w-full max-w-md bg-white rounded-xl shadow-2xl border border-slate-200 p-6 z-10 relative mt-8">
              {step === "intro" && (
                <div className="space-y-6">
                  {/* Documento formal tipo contrato */}
                  <div className="bg-gradient-to-br from-amber-50 to-orange-50/30 border-2 border-amber-900/20 rounded-lg p-6 shadow-inner relative">
                    {/* Sello de agua decorativo */}
                    <div className="absolute top-2 right-2 text-amber-900/5 text-6xl font-black rotate-12">
                      ⚖
                    </div>

                    <div className="relative">
                      <div className="text-center mb-4 pb-2 border-b border-amber-900/20">
                        <p className="text-[10px] uppercase tracking-[0.3em] text-amber-900/60 font-bold">
                          Documento Oficial
                        </p>
                      </div>

                      <p className="text-sm text-slate-800 leading-relaxed mb-4 text-justify">
                        Arqui Bibiana, el diseño para una salida exitosa ya esta
                        listo, solo falta su firma para que se haga la gestión y
                        podamos empezar la obra. Revisa los planos, confirma tu
                        asistencia y prepárate para no dejar de reir.
                      </p>

                      <div className="flex justify-between items-center text-[10px] text-amber-900/50 mt-4 pt-3 border-t border-amber-900/10">
                        <span>📋 Doc. #2026-001</span>
                        <span>📅 {new Date().toLocaleDateString("es-ES")}</span>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <div className="flex items-start gap-3">
                      <div className="text-blue-600 shrink-0 mt-1">
                        <IconMapPin />
                      </div>
                      <div>
                        <h3 className="font-bold text-sm uppercase">
                          Ubicación del Proyecto
                        </h3>
                        <p className="text-slate-600 text-sm">
                          Sitio estratégico con excelente comida (no
                          chunchurria)
                        </p>
                      </div>
                    </div>
                    <div className="flex items-start gap-3">
                      <div className="text-blue-600 shrink-0 mt-1">
                        <IconHardHat />
                      </div>
                      <div>
                        <h3 className="font-bold text-sm uppercase">
                          Objetivo de la Obra
                        </h3>
                        <p className="text-slate-600 text-sm">
                          Conocernos y pasar un buen rato.
                        </p>
                      </div>
                    </div>
                  </div>

                  <button
                    onClick={() => setStep("form")}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2"
                  >
                    REVISAR PLANOS <IconPen />
                  </button>
                </div>
              )}

              {step === "form" && (
                <div className="space-y-6 transition-all duration-500">
                  <div className="space-y-3">
                    <label className="block text-sm font-bold text-slate-700 text-center">
                      ¿Cuándo nos vemos? 💫
                    </label>

                    {/* Date picker con tarjetas */}
                    <div className="grid grid-cols-3 gap-2">
                      {suggestedDates.map((date) => {
                        const formatted = formatDateForDisplay(date);
                        const isSelected = selectedDate === formatted.fullDate;
                        return (
                          <button
                            key={formatted.fullDate}
                            onClick={() => setSelectedDate(formatted.fullDate)}
                            className={`p-3 rounded-xl border-2 transition-all active:scale-95 ${
                              isSelected
                                ? "bg-gradient-to-br from-blue-600 to-purple-600 border-blue-600 text-white shadow-lg scale-105"
                                : "bg-white border-slate-200 text-slate-700 hover:border-blue-300 hover:shadow-md"
                            }`}
                          >
                            <div
                              className={`text-[10px] font-bold uppercase ${
                                isSelected ? "text-blue-100" : "text-slate-400"
                              }`}
                            >
                              {formatted.day}
                            </div>
                            <div
                              className={`text-2xl font-black ${
                                isSelected ? "text-white" : "text-slate-900"
                              }`}
                            >
                              {formatted.date}
                            </div>
                            <div
                              className={`text-[10px] uppercase ${
                                isSelected ? "text-blue-200" : "text-slate-500"
                              }`}
                            >
                              {formatted.month}
                            </div>
                          </button>
                        );
                      })}
                    </div>

                    {/* Opción para otra fecha */}
                    <details className="mt-2">
                      <summary className="text-xs text-blue-600 cursor-pointer hover:text-blue-700 text-center font-medium">
                        ¿Otra fecha?
                      </summary>
                      <div className="mt-3 relative">
                        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                          <IconCalendar />
                        </div>
                        <input
                          type="date"
                          className="w-full pl-10 pr-4 py-3 border-2 border-slate-200 rounded-lg focus:border-blue-500 focus:outline-none bg-slate-50 text-slate-800"
                          onChange={(e) => setSelectedDate(e.target.value)}
                          min={new Date().toISOString().split("T")[0]}
                        />
                      </div>
                    </details>
                  </div>

                  <div className="p-5 border-2 border-dashed border-slate-200 rounded-2xl bg-gradient-to-br from-slate-50 to-blue-50/30 relative h-36 flex flex-col items-center justify-center">
                    {!isSigning ? (
                      <>
                        <p className="text-xs text-slate-400 mb-3 uppercase tracking-wider">
                          Tu confirmación
                        </p>
                        <div className="w-3/4 h-px bg-slate-300 mb-2"></div>
                        <p
                          className="text-slate-300 font-serif text-3xl opacity-30 italic"
                          style={{ fontFamily: "'Dancing Script', cursive" }}
                        >
                          Bibiana
                        </p>
                      </>
                    ) : (
                      <div className="text-center">
                        <div className="mb-3 text-blue-600 flex justify-center animate-bounce">
                          <IconPen />
                        </div>
                        <p className="text-blue-600 font-mono text-xs uppercase tracking-[0.2em]">
                          Sellando...
                        </p>
                      </div>
                    )}
                  </div>

                  <button
                    onClick={handleConfirm}
                    disabled={!selectedDate || isSigning}
                    className={`w-full font-bold py-5 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-lg ${
                      !selectedDate || isSigning
                        ? "bg-slate-300 cursor-not-allowed text-slate-500"
                        : "bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white active:scale-95 shadow-green-600/30"
                    }`}
                  >
                    {isSigning ? "✨ Confirmando..." : "✓ Confirmar Asistencia"}
                  </button>
                </div>
              )}

              {step === "success" && (
                <div className="text-center py-8 transition-all duration-500">
                  <div className="w-24 h-24 bg-gradient-to-br from-green-100 to-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 text-green-600 shadow-lg">
                    <IconCheck />
                  </div>
                  <h2 className="text-3xl font-black text-slate-900 mb-3">
                    ¡Confirmado! 🎉
                  </h2>
                  <p className="text-slate-600 mb-6 text-sm">
                    Nos vemos el: <br />
                    <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 text-2xl">
                      {selectedDate}
                    </span>
                  </p>
                  <div className="bg-gradient-to-r from-blue-50 to-purple-50 rounded-xl p-6 border-2 border-dashed border-blue-200">
                    <div
                      className="text-5xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 py-2 italic"
                      style={{ fontFamily: "'Dancing Script', cursive" }}
                    >
                      Bibiana
                    </div>
                  </div>
                  <p className="text-xs text-slate-400 mt-6 uppercase tracking-wider">
                    📱 Abriendo WhatsApp...
                  </p>
                </div>
              )}
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
